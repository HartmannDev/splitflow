services:
  api:
    image: node:22-bookworm
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD_FILE: /run/secrets/db_password
      DATABASE: splitflow
      PASSWORD_PEPPER_FILE: /run/secrets/password_pepper
      NODE_ENV: dev
      SESSION_SECRET_FILE: /run/secrets/session_secret
      GMAIL_APP_EMAIL: 'dev.mghartmann@gmail.com'
      GMAIL_APP_PASSWORD_FILE: /run/secrets/gmail_app_password
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - db_password
      - password_pepper
      - session_secret
      - gmail_app_password

  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: splitflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d splitflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    secrets:
      - db_password

volumes:
  postgres_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
  password_pepper:
    file: ./secrets/password_pepper.txt
  session_secret:
    file: ./secrets/session_secret.txt
  gmail_app_password:
    file: ./secrets/gmail_app_password.txt
