services:
  api:
    image: node:22-bookworm
    working_dir: /app
    command: sh -c "npm install && node --watch --env-file=.env src/server.ts"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: splitflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d splitflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: